<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aviator - Bet Titan</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal: #008080;
    --teal-light: #20B2AA;
    --teal-dark: #006666;
    --dark: #0a1628;
    --dark-light: #152238;
    --dark-dark: #050d18;
    --text-primary: #FFFFFF;
    --text-secondary: #a8c5e8;
    --success: #00ff88;
    --danger: #ff4757;
    --warning: #ffa502;
    --gold: #ffd700;
    --border: rgba(0, 128, 128, 0.3);
  }
  
  *{box-sizing:border-box;margin:0;padding:0;}
  
  body{
    background:linear-gradient(135deg, var(--dark-dark) 0%, var(--dark) 50%, var(--dark-light) 100%);
    color:var(--text-primary);
    font-family:'Exo 2', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
  }
  
  .game-container{
    width:100%;
    max-width:600px;
    background:var(--dark);
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
  }
  
  .game-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 20px;
    background:rgba(0, 128, 128, 0.1);
    border-bottom:1px solid var(--border);
  }
  
  .game-title{
    font-family:'Orbitron', sans-serif;
    font-size:22px;
    font-weight:700;
    color:var(--teal-light);
  }
  
  .balance-badge{
    background:var(--dark-light);
    border:1px solid var(--border);
    padding:8px 14px;
    border-radius:20px;
    font-weight:700;
    color:var(--teal-light);
  }
  
  .game-area{
    height:300px;
    position:relative;
    background:radial-gradient(ellipse at center bottom, rgba(0, 128, 128, 0.1), transparent);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  
  .multiplier-display{
    font-family:'Orbitron', sans-serif;
    font-size:72px;
    font-weight:900;
    color:var(--teal-light);
    text-shadow:0 0 30px rgba(0, 128, 128, 0.5);
    transition:all .1s;
    z-index:10;
  }
  
  .multiplier-display.flying{
    color:var(--success);
    text-shadow:0 0 30px rgba(0, 255, 136, 0.5);
    animation:pulse 0.5s ease infinite;
  }
  
  .multiplier-display.crashed{
    color:var(--danger);
    text-shadow:0 0 30px rgba(255, 71, 87, 0.5);
    animation:shake 0.3s ease;
  }
  
  @keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
  }
  
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-10px);}
    75%{transform:translateX(10px);}
  }
  
  .plane{
    position:absolute;
    font-size:48px;
    transition:all .1s linear;
    z-index:5;
  }
  
  .trail{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:100px;
    background:linear-gradient(to top, rgba(0, 128, 128, 0.2), transparent);
    opacity:0;
    transition:opacity .3s;
  }
  
  .trail.active{opacity:1;}
  
  .history-bar{
    display:flex;
    gap:6px;
    padding:12px 16px;
    background:var(--dark-light);
    overflow-x:auto;
  }
  
  .history-item{
    padding:4px 10px;
    border-radius:4px;
    font-size:12px;
    font-weight:700;
    white-space:nowrap;
  }
  
  .history-item.low{background:rgba(255,71,87,0.2);color:var(--danger);}
  .history-item.mid{background:rgba(255,165,2,0.2);color:var(--warning);}
  .history-item.high{background:rgba(0,255,136,0.2);color:var(--success);}
  
  .controls{
    padding:20px;
    border-top:1px solid var(--border);
  }
  
  .bet-row{
    display:flex;
    gap:12px;
    margin-bottom:12px;
  }
  
  .bet-input{
    flex:1;
    padding:14px;
    background:var(--dark-light);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text-primary);
    font-size:16px;
    text-align:center;
  }
  
  .btn{
    flex:1;
    padding:14px 20px;
    border-radius:10px;
    font-family:'Rajdhani', sans-serif;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    border:none;
    transition:all .3s;
    text-transform:uppercase;
    letter-spacing:1px;
  }
  
  .btn-primary{
    background:linear-gradient(135deg, var(--teal), var(--teal-dark));
    color:var(--white);
  }
  
  .btn-success{
    background:linear-gradient(135deg, var(--success), #00cc6a);
    color:var(--dark);
    animation:pulseBtn 0.5s ease infinite;
  }
  
  @keyframes pulseBtn{
    0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,0.4);}
    50%{box-shadow:0 0 0 10px rgba(0,255,136,0);}
  }
  
  .btn-danger{
    background:linear-gradient(135deg, var(--danger), #cc3a47);
    color:#fff;
  }
  
  .btn:disabled{
    opacity:0.5;
    cursor:not-allowed;
    animation:none;
  }
  
  .status-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 16px;
    background:rgba(0, 128, 128, 0.1);
    font-size:13px;
  }
  
  .status-bar .label{color:var(--text-secondary);}
  .status-bar .value{font-weight:700;color:var(--teal-light);}
  
  .countdown-bar{
    text-align:center;
    padding:12px;
    background:rgba(255,165,2,0.1);
    color:var(--warning);
    font-weight:600;
  }
  
  .result-overlay{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.7);
    z-index:20;
  }
  
  .result-overlay.show{display:flex;}
  
  .result-message{
    text-align:center;
    padding:30px;
    border-radius:16px;
  }
  
  .result-message.win{background:rgba(0,255,136,0.2);}
  .result-message.lose{background:rgba(255,71,87,0.2);}
  
  .result-message h2{
    font-size:28px;
    margin-bottom:10px;
  }
  
  .result-message.win h2{color:var(--success);}
  .result-message.lose h2{color:var(--danger);}
  
  .result-message p{font-size:16px;color:var(--text-secondary);}
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
<div class="game-container">
  <div class="game-header">
    <h1 class="game-title">AVIATOR</h1>
    <div class="balance-badge">K<span id="balance">0.00</span></div>
  </div>
  
  <div class="game-area">
    <div class="trail" id="trail"></div>
    <div class="multiplier-display" id="multiplier">1.00x</div>
    <div class="plane" id="plane">✈️</div>
    <div class="result-overlay" id="resultOverlay">
      <div class="result-message" id="resultMessage">
        <h2 id="resultTitle">FLEW AWAY!</h2>
        <p id="resultText">Better luck next time</p>
      </div>
    </div>
  </div>
  
  <div class="history-bar" id="historyBar"></div>
  
  <div class="status-bar">
    <div>
      <span class="label">Your Bet: </span>
      <span class="value" id="yourBet">K0.00</span>
    </div>
    <div>
      <span class="label">Potential Win: </span>
      <span class="value" id="potentialWin">K0.00</span>
    </div>
  </div>
  
  <div class="countdown-bar" id="countdownBar" style="display:none;">
    Next flight in <span id="countdown">5</span> seconds...
  </div>
  
  <div class="controls">
    <div class="bet-row">
      <input type="number" class="bet-input" id="betAmount" placeholder="Bet Amount" value="10" min="1">
      <button class="btn btn-primary" id="betBtn" onclick="placeBet()">Place Bet</button>
      <button class="btn btn-success" id="cashoutBtn" onclick="cashout()" style="display:none;">Cash Out</button>
    </div>
  </div>
</div>

<script>
let balance = 100;
let currentBet = 0;
let gamePhase = 'waiting'; // waiting, betting, flying, crashed
let multiplier = 1.0;
let crashPoint = 1.0;
let animationFrame = null;
let startTime = 0;
let history = [];

// Generate random crash point with house edge
function generateCrashPoint() {
  // Instant crash (1.00x) has ~1% chance
  const instantCrash = Math.random() < 0.01;
  if (instantCrash) return 1.0;
  
  // Generate crash point with exponential distribution
  // This gives a more realistic crash game feel
  const r = Math.random();
  // Formula: crash = 0.99 / (1 - r) with house edge
  // Capped at 100x for practicality
  const crash = Math.min(100, (0.99 / (1 - r)));
  return Math.max(1.0, parseFloat(crash.toFixed(2)));
}

function updateBalance() {
  document.getElementById('balance').textContent = balance.toFixed(2);
}

function updateHistory() {
  const bar = document.getElementById('historyBar');
  bar.innerHTML = history.slice(-10).reverse().map(h => {
    let cls = 'low';
    if (h >= 2) cls = 'mid';
    if (h >= 5) cls = 'high';
    return `<div class="history-item ${cls}">${h.toFixed(2)}x</div>`;
  }).join('');
}

function placeBet() {
  if (gamePhase !== 'waiting') {
    alert('Wait for the next round');
    return;
  }
  
  const bet = parseFloat(document.getElementById('betAmount').value);
  if (bet <= 0 || bet > balance) {
    alert('Invalid bet amount');
    return;
  }
  
  currentBet = bet;
  balance -= bet;
  updateBalance();
  
  document.getElementById('yourBet').textContent = 'K' + currentBet.toFixed(2);
  document.getElementById('betBtn').style.display = 'none';
  document.getElementById('betAmount').disabled = true;
  
  // Bet is placed, waiting for next flight
}

function startGame() {
  gamePhase = 'flying';
  crashPoint = generateCrashPoint();
  multiplier = 1.0;
  startTime = Date.now();
  
  document.getElementById('countdownBar').style.display = 'none';
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('trail').classList.add('active');
  document.getElementById('multiplier').classList.remove('crashed');
  document.getElementById('multiplier').classList.add('flying');
  
  if (currentBet > 0) {
    document.getElementById('cashoutBtn').style.display = 'block';
    document.getElementById('cashoutBtn').disabled = false;
  }
  
  animateFlight();
}

function animateFlight() {
  const elapsed = (Date.now() - startTime) / 1000;
  
  // Multiplier grows exponentially
  multiplier = Math.pow(Math.E, elapsed * 0.1);
  multiplier = parseFloat(multiplier.toFixed(2));
  
  // Update display
  document.getElementById('multiplier').textContent = multiplier.toFixed(2) + 'x';
  
  // Update potential win
  if (currentBet > 0) {
    document.getElementById('potentialWin').textContent = 'K' + (currentBet * multiplier).toFixed(2);
  }
  
  // Move plane
  const progress = Math.min((multiplier - 1) / 10, 1);
  const plane = document.getElementById('plane');
  plane.style.transform = `translate(${progress * 200}px, ${-progress * 150}px) rotate(${-15 + progress * 10}deg)`;
  
  // Check for crash
  if (multiplier >= crashPoint) {
    crash();
    return;
  }
  
  animationFrame = requestAnimationFrame(animateFlight);
}

function cashout() {
  if (gamePhase !== 'flying' || currentBet <= 0) return;
  
  const winAmount = currentBet * multiplier;
  balance += winAmount;
  updateBalance();
  
  cancelAnimationFrame(animationFrame);
  gamePhase = 'cashedout';
  
  document.getElementById('cashoutBtn').style.display = 'none';
  
  showResult('win', 'Cashed Out!', `Won K${winAmount.toFixed(2)} at ${multiplier.toFixed(2)}x!`);
  
  currentBet = 0;
  document.getElementById('yourBet').textContent = 'K0.00';
  document.getElementById('potentialWin').textContent = 'K0.00';
  
  setTimeout(startCountdown, 3000);
}

function crash() {
  gamePhase = 'crashed';
  cancelAnimationFrame(animationFrame);
  
  document.getElementById('multiplier').classList.remove('flying');
  document.getElementById('multiplier').classList.add('crashed');
  document.getElementById('trail').classList.remove('active');
  
  history.push(multiplier);
  updateHistory();
  
  if (currentBet > 0) {
    showResult('lose', 'FLEW AWAY!', `Lost K${currentBet.toFixed(2)} at ${multiplier.toFixed(2)}x`);
    currentBet = 0;
  } else {
    showResult('lose', 'FLEW AWAY!', `Crashed at ${multiplier.toFixed(2)}x`);
  }
  
  document.getElementById('cashoutBtn').style.display = 'none';
  document.getElementById('yourBet').textContent = 'K0.00';
  document.getElementById('potentialWin').textContent = 'K0.00';
  
  setTimeout(startCountdown, 3000);
}

function showResult(type, title, text) {
  document.getElementById('resultOverlay').classList.add('show');
  document.getElementById('resultMessage').className = 'result-message ' + type;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultText').textContent = text;
}

function startCountdown() {
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('betBtn').style.display = 'block';
  document.getElementById('betAmount').disabled = false;
  document.getElementById('betBtn').disabled = true;
  document.getElementById('multiplier').classList.remove('crashed', 'flying');
  document.getElementById('multiplier').textContent = '1.00x';
  document.getElementById('plane').style.transform = 'translate(0, 0) rotate(-15deg)';
  gamePhase = 'waiting';
  
  let countdown = 5;
  document.getElementById('countdownBar').style.display = 'block';
  document.getElementById('countdown').textContent = countdown;
  
  const interval = setInterval(() => {
    countdown--;
    document.getElementById('countdown').textContent = countdown;
    
    if (countdown <= 0) {
      clearInterval(interval);
      document.getElementById('countdownBar').style.display = 'none';
      document.getElementById('betBtn').disabled = false;
      startGame();
    }
  }, 1000);
}

// Initialize
updateBalance();
updateHistory();

// Start first round after 3 seconds
setTimeout(startCountdown, 1000);

// Listen for balance updates from parent
window.addEventListener('message', function(e) {
  if (e.data.type === 'balance') {
    balance = e.data.balance;
    updateBalance();
  }
});
</script>
</body>
</html>
