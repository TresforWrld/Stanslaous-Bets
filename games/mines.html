<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mines - Bet Titan</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal: #008080;
    --teal-light: #20B2AA;
    --teal-dark: #006666;
    --dark: #0a1628;
    --dark-light: #152238;
    --dark-dark: #050d18;
    --text-primary: #FFFFFF;
    --text-secondary: #a8c5e8;
    --success: #00ff88;
    --danger: #ff4757;
    --warning: #ffa502;
    --gold: #ffd700;
    --border: rgba(0, 128, 128, 0.3);
  }
  
  *{box-sizing:border-box;margin:0;padding:0;}
  
  body{
    background:linear-gradient(135deg, var(--dark-dark) 0%, var(--dark) 50%, var(--dark-light) 100%);
    color:var(--text-primary);
    font-family:'Exo 2', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
  }
  
  .game-container{
    width:100%;
    max-width:500px;
    background:var(--dark);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
  }
  
  .game-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
  }
  
  .game-title{
    font-family:'Orbitron', sans-serif;
    font-size:24px;
    font-weight:700;
    color:var(--teal-light);
  }
  
  .balance-display{
    text-align:center;
    padding:14px;
    background:var(--dark-light);
    border-radius:12px;
    margin-bottom:16px;
    border:1px solid var(--border);
  }
  
  .balance-display .label{font-size:12px;color:var(--text-secondary);}
  .balance-display .amount{font-size:28px;font-weight:700;color:var(--teal-light);}
  
  .controls{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:20px;
  }
  
  .control-group label{
    display:block;
    font-size:11px;
    color:var(--text-secondary);
    margin-bottom:6px;
    text-transform:uppercase;
  }
  
  .control-group input,.control-group select{
    width:100%;
    padding:12px;
    background:var(--dark-light);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text-primary);
    font-size:14px;
    text-align:center;
  }
  
  .mines-selector{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:20px;
    flex-wrap:wrap;
  }
  
  .mine-option{
    padding:10px 18px;
    background:var(--dark-light);
    border:2px solid var(--border);
    border-radius:8px;
    color:var(--text-secondary);
    font-weight:600;
    cursor:pointer;
    transition:all .3s;
    font-size:14px;
  }
  
  .mine-option.active{
    border-color:var(--teal);
    color:var(--teal-light);
    background:rgba(0, 128, 128, 0.15);
  }
  
  .grid-container{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:8px;
    margin-bottom:20px;
  }
  
  .grid-cell{
    aspect-ratio:1;
    background:var(--dark-light);
    border:2px solid var(--border);
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    cursor:pointer;
    transition:all .2s;
  }
  
  .grid-cell:hover:not(.revealed){
    border-color:var(--teal);
    transform:scale(1.05);
  }
  
  .grid-cell.revealed{cursor:default;transform:none;}
  
  .grid-cell.gem{
    background:linear-gradient(135deg, var(--success), #00cc6a);
    border-color:var(--success);
    animation:revealPop 0.3s ease;
  }
  
  .grid-cell.mine{
    background:linear-gradient(135deg, var(--danger), #cc3a47);
    border-color:var(--danger);
    animation:revealPop 0.3s ease;
  }
  
  @keyframes revealPop{
    0%{transform:scale(0.8);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
  }
  
  .multiplier-display{
    text-align:center;
    padding:16px;
    background:var(--dark-light);
    border-radius:12px;
    margin-bottom:16px;
    border:1px solid var(--border);
  }
  
  .multiplier-display .label{font-size:12px;color:var(--text-secondary);}
  .multiplier-display .value{
    font-size:32px;
    font-weight:800;
    color:var(--gold);
    font-family:'Orbitron', sans-serif;
  }
  
  .action-buttons{
    display:flex;
    gap:10px;
  }
  
  .btn{
    flex:1;
    padding:14px;
    border-radius:10px;
    font-family:'Rajdhani', sans-serif;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    border:none;
    transition:all .3s;
    text-transform:uppercase;
    letter-spacing:1px;
  }
  
  .btn-primary{
    background:linear-gradient(135deg, var(--teal), var(--teal-dark));
    color:var(--white);
  }
  
  .btn-success{
    background:linear-gradient(135deg, var(--success), #00cc6a);
    color:var(--dark);
  }
  
  .btn-danger{
    background:linear-gradient(135deg, var(--danger), #cc3a47);
    color:#fff;
  }
  
  .btn:disabled{
    opacity:0.5;
    cursor:not-allowed;
  }
  
  .status-message{
    text-align:center;
    padding:16px;
    border-radius:12px;
    margin-bottom:16px;
    font-weight:700;
    font-size:16px;
  }
  
  .status-message.win{background:rgba(0,255,136,0.2);color:var(--success);}
  .status-message.lose{background:rgba(255,71,87,0.2);color:var(--danger);}
  .status-message.waiting{background:rgba(255,165,2,0.2);color:var(--warning);}
  
  .countdown{
    font-size:14px;
    color:var(--warning);
    text-align:center;
    margin-top:10px;
  }
  
  .instructions{
    font-size:12px;
    color:var(--text-secondary);
    text-align:center;
    margin-top:16px;
    line-height:1.6;
  }
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
<div class="game-container">
  <div class="game-header">
    <h1 class="game-title">MINES</h1>
    <div class="balance-display" style="padding:8px 16px;margin:0;">
      <span class="label">Balance</span>
      <span class="amount" id="balance">K0.00</span>
    </div>
  </div>
  
  <div class="balance-display">
    <div class="label">Current Balance</div>
    <div class="amount" id="balanceLarge">K0.00</div>
  </div>
  
  <div class="controls">
    <div class="control-group">
      <label>Bet Amount</label>
      <input type="number" id="betAmount" value="10" min="1">
    </div>
    <div class="control-group">
      <label>Mines</label>
      <select id="minesCount">
        <option value="3">3 Mines</option>
        <option value="5" selected>5 Mines</option>
        <option value="10">10 Mines</option>
        <option value="15">15 Mines</option>
        <option value="20">20 Mines</option>
      </select>
    </div>
  </div>
  
  <div class="multiplier-display">
    <div class="label">Current Multiplier</div>
    <div class="value" id="multiplier">1.00x</div>
  </div>
  
  <div class="grid-container" id="grid"></div>
  
  <div class="status-message" id="statusMsg" style="display:none;"></div>
  
  <div class="countdown" id="countdown" style="display:none;">
    Next round in <span id="countdownTimer">5</span> seconds...
  </div>
  
  <div class="action-buttons">
    <button class="btn btn-primary" id="startBtn" onclick="startGame()">Start Game</button>
    <button class="btn btn-success" id="cashoutBtn" onclick="cashout()" style="display:none;">Cash Out</button>
  </div>
  
  <div class="instructions">
    Click cells to reveal gems. Avoid mines! Cash out anytime to secure your winnings.
    More mines = higher risk but better multipliers.
  </div>
</div>

<script>
// Get balance from parent
let balance = 0;
let gameActive = false;
let currentBet = 0;
let minesCount = 5;
let revealed = 0;
let multiplier = 1.0;
let minePositions = [];
let gridRevealed = [];
let countdownInterval = null;

// Multiplier calculation (based on mines count and revealed gems)
function calculateMultiplier(mines, gems) {
  if (gems === 0) return 1.0;
  const totalCells = 25;
  const safeCells = totalCells - mines;
  
  // Progressive multiplier that increases with each gem
  let mult = 1.0;
  for (let i = 0; i < gems; i++) {
    const remaining = safeCells - i;
    const probability = remaining / (totalCells - i);
    mult *= (1 / probability) * 0.97; // 3% house edge
  }
  return Math.max(1.0, mult);
}

function updateBalance() {
  document.getElementById('balance').textContent = 'K' + balance.toFixed(2);
  document.getElementById('balanceLarge').textContent = 'K' + balance.toFixed(2);
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  
  for (let i = 0; i < 25; i++) {
    const cell = document.createElement('div');
    cell.className = 'grid-cell' + (gridRevealed[i] ? ' revealed ' + gridRevealed[i] : '');
    cell.dataset.index = i;
    
    if (gridRevealed[i] === 'gem') {
      cell.innerHTML = '💎';
    } else if (gridRevealed[i] === 'mine') {
      cell.innerHTML = '💣';
    } else if (!gridRevealed[i]) {
      cell.onclick = () => revealCell(i);
    }
    
    grid.appendChild(cell);
  }
}

function startGame() {
  currentBet = parseFloat(document.getElementById('betAmount').value);
  minesCount = parseInt(document.getElementById('minesCount').value);
  
  if (currentBet <= 0) {
    alert('Enter a valid bet amount');
    return;
  }
  
  if (currentBet > balance) {
    alert('Insufficient balance');
    return;
  }
  
  // Deduct bet
  balance -= currentBet;
  updateBalance();
  
  // Reset game state
  gameActive = true;
  revealed = 0;
  multiplier = 1.0;
  gridRevealed = new Array(25).fill(null);
  
  // Generate random mine positions using crypto-random
  minePositions = [];
  const positions = Array.from({length: 25}, (_, i) => i);
  
  // Fisher-Yates shuffle for randomness
  for (let i = positions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [positions[i], positions[j]] = [positions[j], positions[i]];
  }
  
  minePositions = positions.slice(0, minesCount);
  
  // Update UI
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('cashoutBtn').style.display = 'block';
  document.getElementById('statusMsg').style.display = 'none';
  document.getElementById('countdown').style.display = 'none';
  document.getElementById('multiplier').textContent = '1.00x';
  
  renderGrid();
}

function revealCell(index) {
  if (!gameActive || gridRevealed[index]) return;
  
  if (minePositions.includes(index)) {
    // Hit a mine - GAME OVER
    gridRevealed[index] = 'mine';
    gameActive = false;
    
    // Reveal all mines
    minePositions.forEach(pos => {
      gridRevealed[pos] = 'mine';
    });
    
    renderGrid();
    showResult('lose', 'BOOM! You hit a mine! Lost K' + currentBet.toFixed(2));
    startCountdown();
  } else {
    // Found a gem
    gridRevealed[index] = 'gem';
    revealed++;
    
    // Calculate new multiplier
    multiplier = calculateMultiplier(minesCount, revealed);
    document.getElementById('multiplier').textContent = multiplier.toFixed(2) + 'x';
    
    renderGrid();
    
    // Check if all gems found
    if (revealed === (25 - minesCount)) {
      // Auto cashout
      cashout();
    }
  }
}

function cashout() {
  if (!gameActive) return;
  
  gameActive = false;
  const winAmount = currentBet * multiplier;
  balance += winAmount;
  updateBalance();
  
  // Reveal remaining mines
  minePositions.forEach(pos => {
    gridRevealed[pos] = 'mine';
  });
  renderGrid();
  
  showResult('win', 'Cashed out! Won K' + winAmount.toFixed(2) + ' (' + multiplier.toFixed(2) + 'x)');
  startCountdown();
}

function showResult(type, message) {
  const statusMsg = document.getElementById('statusMsg');
  statusMsg.className = 'status-message ' + type;
  statusMsg.textContent = message;
  statusMsg.style.display = 'block';
  
  document.getElementById('cashoutBtn').style.display = 'none';
}

function startCountdown() {
  let seconds = 5;
  document.getElementById('countdown').style.display = 'block';
  document.getElementById('countdownTimer').textContent = seconds;
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('startBtn').disabled = true;
  
  countdownInterval = setInterval(() => {
    seconds--;
    document.getElementById('countdownTimer').textContent = seconds;
    
    if (seconds <= 0) {
      clearInterval(countdownInterval);
      document.getElementById('countdown').style.display = 'none';
      document.getElementById('startBtn').disabled = false;
      document.getElementById('statusMsg').style.display = 'none';
      
      // Reset grid
      gridRevealed = new Array(25).fill(null);
      renderGrid();
      document.getElementById('multiplier').textContent = '1.00x';
    }
  }, 1000);
}

// Initialize
window.addEventListener('message', function(e) {
  if (e.data.type === 'balance') {
    balance = e.data.balance;
    updateBalance();
  }
});

// Request balance from parent
if (window.parent !== window) {
  window.parent.postMessage({type: 'getBalance'}, '*');
}

// Initial render
renderGrid();
updateBalance();
</script>
</body>
</html>
